<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentVault — Replay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dot-grid"></div>

  <header class="toolbar">
    <div class="toolbar-left">
      <div class="brand">
        <span class="brand-icon">&#9670;</span>
        <span class="brand-name">AgentVault</span>
      </div>
      <span class="toolbar-sep"></span>
      <span class="toolbar-label">Protocol Replay</span>
    </div>
    <div class="toolbar-right">
      <a href="/" class="back-link">&larr; Back to Live</a>
    </div>
  </header>

  <div class="replay-bar">
    <label for="run-select">Run</label>
    <select id="run-select"></select>
    <label for="speed-input">Speed</label>
    <input type="number" id="speed-input" value="3" min="0.5" max="20" step="0.5" style="width:56px">
    <button class="btn-secondary" id="replay-btn">Play</button>
  </div>

  <main class="viewport">
    <div class="protocol-view" id="protocol-phase">
      <div class="sim-grid" id="sim-grid">
        <!-- Left panel: Alice's chat -->
        <div class="sim-panel sim-panel--chat sim-panel--alice" id="panel-left">
          <div class="sim-panel__header">
            <span class="sim-panel__agent-name">
              <span class="sim-panel__agent-dot"></span>
              Alice
              <span class="sim-panel__role">(principal)</span>
            </span>
            <span class="sim-panel__agent-badge">INITIATOR</span>
          </div>
          <div class="sim-panel__messages" id="alice-log"></div>
        </div>

        <!-- Centre panel: The Vault -->
        <div class="sim-panel sim-panel--vault" id="panel-centre">
          <div class="sim-panel__header">
            <span class="sim-panel__vault-label">Session</span>
          </div>
          <div class="sim-panel__vault-scroll" id="vault-scroll">
            <div class="sim-panel__vault-events" id="vault-events"></div>
          </div>
          <div class="signal-overlay" id="signal-overlay"></div>
        </div>

        <!-- Right panel: Bob's chat -->
        <div class="sim-panel sim-panel--chat sim-panel--bob" id="panel-right">
          <div class="sim-panel__header">
            <span class="sim-panel__agent-name">
              <span class="sim-panel__agent-dot"></span>
              Bob
              <span class="sim-panel__role">(principal)</span>
            </span>
            <span class="sim-panel__agent-badge">RESPONDER</span>
          </div>
          <div class="sim-panel__messages" id="bob-log"></div>
        </div>
      </div>

      <!-- Collapsible protocol log (debug view) -->
      <section class="log-panel collapsed" id="log-panel">
        <div class="log-bar" id="log-bar">
          <div class="log-title">
            <span class="log-icon">&#9642;</span>
            <h3>Protocol Events</h3>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="log-count" id="event-count">0 events</span>
            <span class="log-chevron">&#9656;</span>
          </div>
        </div>
        <div class="log-feed" id="event-log"></div>
      </section>
    </div>
  </main>

  <script src="render.js"></script>
  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };

    var els = {
      aliceLog: $('alice-log'),
      bobLog: $('bob-log'),
      vaultEvents: $('vault-events'),
      eventLog: $('event-log'),
      logPanel: $('log-panel'),
      logBar: $('log-bar'),
      runSelect: $('run-select'),
      speedInput: $('speed-input'),
      replayBtn: $('replay-btn'),
      eventCount: $('event-count'),
      signalOverlay: $('signal-overlay'),
    };

    var eventSource = null;
    var totalEvents = 0;

    // Init vault card manager
    VaultCardManager.init(els.vaultEvents);

    // Show result cards in chat panels on output signal (once per session)
    var resultCardRendered = false;
    VaultCardManager.setOutputSignalCallback(function (agent, output, receipt) {
      if (resultCardRendered) return;
      resultCardRendered = true;
      var card1 = createResultCard(output, receipt);
      var card2 = createResultCard(output, receipt);
      els.aliceLog.appendChild(card1);
      scrollToBottom(els.aliceLog);
      els.bobLog.appendChild(card2);
      scrollToBottom(els.bobLog);
    });

    // Log panel toggle
    if (els.logBar) {
      els.logBar.addEventListener('click', function () {
        els.logPanel.classList.toggle('collapsed');
      });
    }

    function handleEvent(event) {
      if (event.type === 'user_message') {
        var panel = event.agent === 'alice' ? els.aliceLog : event.agent === 'bob' ? els.bobLog : null;
        if (panel) {
          panel.appendChild(createPromptBubble(event.payload.text, 'You'));
          scrollToBottom(panel);
        }
        return;
      }

      if (event.type === 'llm_text') {
        var panel = event.agent === 'alice' ? els.aliceLog : event.agent === 'bob' ? els.bobLog : null;
        if (panel) {
          var msg = createChatBubble(event);
          if (msg) {
            panel.appendChild(msg);
            scrollToBottom(panel);
          }
        }
      } else {
        totalEvents++;
        els.eventCount.textContent = totalEvents + ' event' + (totalEvents === 1 ? '' : 's');

        VaultCardManager.routeEvent(event);

        els.eventLog.appendChild(createLogEntry(event));
        scrollToBottom(els.eventLog);
      }
    }

    async function loadRuns() {
      try {
        var res = await fetch('/api/runs');
        var data = await res.json();
        els.runSelect.textContent = '';
        if (data.runs.length === 0) {
          var opt = document.createElement('option');
          opt.textContent = 'No runs available';
          opt.disabled = true;
          els.runSelect.appendChild(opt);
          els.replayBtn.disabled = true;
        } else {
          data.runs.forEach(function (run) {
            var opt = document.createElement('option');
            opt.value = run;
            opt.textContent = run;
            els.runSelect.appendChild(opt);
          });
          els.replayBtn.disabled = false;
        }
      } catch (e) {
        console.error('Failed to load runs:', e);
      }
    }

    els.replayBtn.addEventListener('click', function () {
      if (eventSource) eventSource.close();

      els.aliceLog.textContent = '';
      els.bobLog.textContent = '';
      els.eventLog.textContent = '';
      els.vaultEvents.textContent = '';
      totalEvents = 0;
      els.eventCount.textContent = '0 events';
      VaultCardManager.init(els.vaultEvents);
      resultCardRendered = false;
      VaultCardManager.setOutputSignalCallback(function (agent, output, receipt) {
        if (resultCardRendered) return;
        resultCardRendered = true;
        var card1 = createResultCard(output, receipt);
        var card2 = createResultCard(output, receipt);
        els.aliceLog.appendChild(card1);
        scrollToBottom(els.aliceLog);
        els.bobLog.appendChild(card2);
        scrollToBottom(els.bobLog);
      });

      // Dismiss any open signal overlay
      els.signalOverlay.classList.remove('signal-overlay--visible');

      var file = els.runSelect.value;
      var speed = parseFloat(els.speedInput.value) || 3;

      els.replayBtn.disabled = true;
      eventSource = new EventSource('/api/replay?file=' + encodeURIComponent(file) + '&speed=' + speed);

      eventSource.onmessage = function (e) {
        try { handleEvent(JSON.parse(e.data)); }
        catch (err) { console.error('Replay parse error:', err); }
      };

      eventSource.onerror = function () {
        els.replayBtn.disabled = false;
        if (eventSource) eventSource.close();
        eventSource = null;
      };
    });

    loadRuns();
  })();
  </script>
</body>
</html>
