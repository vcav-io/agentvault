<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentVault — Replay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dot-grid"></div>

  <header class="toolbar">
    <div class="toolbar-left">
      <div class="brand">
        <span class="brand-icon">&#9670;</span>
        <span class="brand-name">AgentVault</span>
      </div>
      <span class="toolbar-sep"></span>
      <span class="toolbar-label">Protocol Replay</span>
    </div>
    <div class="toolbar-right">
      <a href="/" class="back-link">&larr; Back to Live</a>
    </div>
  </header>

  <div class="replay-bar">
    <label for="run-select">Run</label>
    <select id="run-select"></select>
    <label for="speed-input">Speed</label>
    <input type="number" id="speed-input" value="3" min="0.5" max="20" step="0.5" style="width:56px">
    <button class="btn-secondary" id="replay-btn">Play</button>
  </div>

  <main class="viewport">
    <div class="protocol-view" id="protocol-phase">
      <div class="agents">
        <section class="agent alice" id="alice-panel">
          <div class="agent-bar">
            <div class="agent-id">
              <span class="agent-dot"></span>
              <h2>Alice</h2>
              <span class="agent-badge">INITIATOR</span>
            </div>
          </div>
          <div class="agent-feed" id="alice-log"></div>
        </section>

        <div class="channel active" id="channel">
          <div class="channel-track">
            <div class="channel-particle"></div>
            <div class="channel-particle"></div>
          </div>
          <span class="channel-label">AFAL</span>
          <div class="channel-track">
            <div class="channel-particle"></div>
            <div class="channel-particle"></div>
          </div>
        </div>

        <section class="agent bob" id="bob-panel">
          <div class="agent-bar">
            <div class="agent-id">
              <span class="agent-dot"></span>
              <h2>Bob</h2>
              <span class="agent-badge">RESPONDER</span>
            </div>
          </div>
          <div class="agent-feed" id="bob-log"></div>
        </section>
      </div>

      <section class="log-panel">
        <div class="log-bar">
          <div class="log-title">
            <span class="log-icon">&#9642;</span>
            <h3>Protocol Events</h3>
          </div>
          <span class="log-count" id="event-count">0 events</span>
        </div>
        <div class="log-feed" id="event-log"></div>
      </section>
    </div>
  </main>

  <script src="render.js"></script>
  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };

    var els = {
      aliceLog: $('alice-log'),
      bobLog: $('bob-log'),
      eventLog: $('event-log'),
      runSelect: $('run-select'),
      speedInput: $('speed-input'),
      replayBtn: $('replay-btn'),
      eventCount: $('event-count'),
    };

    var eventSource = null;
    var totalEvents = 0;

    function handleEvent(event) {
      if (event.type === 'llm_text') {
        var panel = event.agent === 'alice' ? els.aliceLog : event.agent === 'bob' ? els.bobLog : null;
        if (panel) {
          var msg = createConvMessage(event);
          if (msg) {
            panel.appendChild(msg);
            scrollToBottom(panel);
          }
        }
      } else {
        totalEvents++;
        els.eventCount.textContent = totalEvents + ' event' + (totalEvents === 1 ? '' : 's');
        els.eventLog.appendChild(createLogEntry(event));
        scrollToBottom(els.eventLog);
      }
    }

    async function loadRuns() {
      try {
        var res = await fetch('/api/runs');
        var data = await res.json();
        els.runSelect.textContent = '';
        if (data.runs.length === 0) {
          var opt = document.createElement('option');
          opt.textContent = 'No runs available';
          opt.disabled = true;
          els.runSelect.appendChild(opt);
          els.replayBtn.disabled = true;
        } else {
          data.runs.forEach(function (run) {
            var opt = document.createElement('option');
            opt.value = run;
            opt.textContent = run;
            els.runSelect.appendChild(opt);
          });
          els.replayBtn.disabled = false;
        }
      } catch (e) {
        console.error('Failed to load runs:', e);
      }
    }

    els.replayBtn.addEventListener('click', function () {
      if (eventSource) eventSource.close();

      els.aliceLog.textContent = '';
      els.bobLog.textContent = '';
      els.eventLog.textContent = '';
      totalEvents = 0;
      els.eventCount.textContent = '0 events';

      var file = els.runSelect.value;
      var speed = parseFloat(els.speedInput.value) || 3;

      els.replayBtn.disabled = true;
      eventSource = new EventSource('/api/replay?file=' + encodeURIComponent(file) + '&speed=' + speed);

      eventSource.onmessage = function (e) {
        try { handleEvent(JSON.parse(e.data)); }
        catch (err) { console.error('Replay parse error:', err); }
      };

      eventSource.onerror = function () {
        els.replayBtn.disabled = false;
        if (eventSource) eventSource.close();
        eventSource = null;
      };
    });

    loadRuns();
  })();
  </script>
</body>
</html>
