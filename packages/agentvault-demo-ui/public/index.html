<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentVault — Protocol Observatory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dot-grid"></div>

  <header class="toolbar">
    <div class="toolbar-left">
      <div class="brand">
        <span class="brand-icon">&#9670;</span>
        <span class="brand-name">AgentVault</span>
      </div>
      <span class="toolbar-sep"></span>
      <span class="toolbar-label">Bounded-Disclosure Mediation</span>
    </div>
    <div class="toolbar-right">
      <div class="status-chip" id="status-chip">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Configure</span>
      </div>
      <button class="btn-secondary" id="reset-btn" style="display:none">Reset</button>
      <button class="btn-secondary" id="new-run-btn" style="display:none">New Run</button>
      <a href="/replay.html" class="back-link">Replay</a>
    </div>
  </header>

  <main class="viewport">
    <!-- Setup phase: prompt editors + template selector -->
    <div class="setup" id="setup-phase">
      <div class="setup-header">
        <h2>Configure Agents</h2>
        <div class="template-selector">
          <label for="template-select">Template</label>
          <select id="template-select">
            <option value="mediation">Co-founder Mediation</option>
            <option value="architecture">Architecture Dispute</option>
            <option value="custom">Blank</option>
          </select>
        </div>
      </div>
      <div class="prompt-editors">
        <div class="prompt-editor alice">
          <div class="prompt-label">
            <span class="dot"></span>
            <label for="alice-prompt">Alice &mdash; Initiator</label>
          </div>
          <textarea id="alice-prompt" placeholder="Enter Alice's instructions..."></textarea>
        </div>
        <div class="prompt-editor bob">
          <div class="prompt-label">
            <span class="dot"></span>
            <label for="bob-prompt">Bob &mdash; Responder</label>
          </div>
          <textarea id="bob-prompt" placeholder="Enter Bob's instructions..."></textarea>
        </div>
      </div>
      <div class="setup-actions">
        <button class="btn-primary btn-large" id="start-btn">Start Protocol</button>
      </div>
    </div>

    <!-- Protocol view: conversation panels + protocol log -->
    <div class="protocol-view hidden" id="protocol-phase">
      <div class="agents">
        <section class="agent alice" id="alice-panel">
          <div class="agent-bar">
            <div class="agent-id">
              <span class="agent-dot" id="alice-dot"></span>
              <h2>Alice</h2>
              <span class="agent-badge">INITIATOR</span>
            </div>
            <span class="agent-turns" id="alice-turns"></span>
          </div>
          <div class="agent-feed" id="alice-log"></div>
        </section>

        <div class="channel" id="channel">
          <div class="channel-track">
            <div class="channel-particle"></div>
            <div class="channel-particle"></div>
          </div>
          <span class="channel-label">AFAL</span>
          <div class="channel-track">
            <div class="channel-particle"></div>
            <div class="channel-particle"></div>
          </div>
        </div>

        <section class="agent bob" id="bob-panel">
          <div class="agent-bar">
            <div class="agent-id">
              <span class="agent-dot" id="bob-dot"></span>
              <h2>Bob</h2>
              <span class="agent-badge">RESPONDER</span>
            </div>
            <span class="agent-turns" id="bob-turns"></span>
          </div>
          <div class="agent-feed" id="bob-log"></div>
        </section>
      </div>

      <section class="log-panel">
        <div class="log-bar">
          <div class="log-title">
            <span class="log-icon">&#9642;</span>
            <h3>Protocol Events</h3>
          </div>
          <span class="log-count" id="event-count">0 events</span>
        </div>
        <div class="log-feed" id="event-log"></div>
      </section>
    </div>
  </main>

  <script src="render.js"></script>
  <script src="app.js"></script>
</body>
</html>
