name: CI (TypeScript)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # TODO: After validating lint rules are not noisy (~1 week), add lint as required status check.
      # When promoting, also check vcav repo's ci-lint.yml (vcav-io/vcav) to promote both repos symmetrically.
      - name: Lint agentvault-client
        working-directory: packages/agentvault-client
        run: npm ci && npm run lint

      - name: Lint agentvault-mcp-server
        working-directory: packages/agentvault-mcp-server
        run: npm ci && npm run lint

      - name: Test agentvault-client
        working-directory: packages/agentvault-client
        run: npm test

      - name: Build & test agentvault-mcp-server
        working-directory: packages/agentvault-mcp-server
        run: npm run build && npm test
