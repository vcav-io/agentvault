name: CI (TypeScript)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint & build agentvault-client
        working-directory: packages/agentvault-client
        run: npm ci && npm run lint && npm run build

      - name: Lint agentvault-mcp-server
        working-directory: packages/agentvault-mcp-server
        run: npm ci && npm run lint

      - name: Test agentvault-client
        working-directory: packages/agentvault-client
        run: npm test

      - name: Build & test agentvault-mcp-server
        working-directory: packages/agentvault-mcp-server
        run: npm run build && npm test

      - name: Build & test agentvault-demo-ui
        working-directory: packages/agentvault-demo-ui
        run: npm ci && npx playwright install --with-deps chromium && npm run build && npm test
