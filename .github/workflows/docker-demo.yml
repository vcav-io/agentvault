name: Build and Push Demo Image

on:
  push:
    branches: [main]
    paths:
      - 'packages/agentvault-client/**'
      - 'packages/agentvault-mcp-server/**'
      - 'packages/agentvault-demo-ui/**'
      - 'docker/Dockerfile.demo'
      - 'demo/alice-prompt.md'
      - 'demo/bob-prompt.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vcav-io/agentvault-demo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.demo
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
