services:
  relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    image: agentvault-relay:local
    ports:
      - "3100:3100"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AV_MODEL_ID=${AV_MODEL_ID:-claude-haiku-4-5-20251001}
      - AV_OPENAI_MODEL_ID=${AV_OPENAI_MODEL_ID:-gpt-4.1-mini}
      - AV_GEMINI_MODEL_ID=${AV_GEMINI_MODEL_ID:-gemini-2.5-flash}
      - AV_ENV=dev
      - AV_INBOX_AUTH=off
      - AV_HEALTH_EXPOSE_MODEL=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3100/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
    image: agentvault-demo:local
    ports:
      - "3200:3200"
    depends_on:
      relay:
        condition: service_healthy
    environment:
      - DEMO_BIND_ADDRESS=0.0.0.0
      - AV_RELAY_URL=http://relay:3100
      - AV_WORKDIR=/app/packages/agentvault-demo-ui
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
